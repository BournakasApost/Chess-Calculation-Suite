<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Vision Suite - Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <!-- External Puzzle Databases -->
    <script src="normal_tactics_db.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .boss-glow { filter: drop-shadow(0 0 10px rgba(147, 51, 234, 0.7)); }
        
        /* Animation for wrong answers in Adaptive Engine */
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen m-0 p-0">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // --- DATABASE INIT ---
        const NORMAL_TACTICS = window.NORMAL_TACTICS || [];

        // --- SVG PIECE COMPONENTS ---
        const PIECE_IMAGES = {
            White: {
                Pawn: "https://upload.wikimedia.org/wikipedia/commons/4/45/Chess_plt45.svg",
                Knight: "https://upload.wikimedia.org/wikipedia/commons/7/70/Chess_nlt45.svg",
                Bishop: "https://upload.wikimedia.org/wikipedia/commons/b/b1/Chess_blt45.svg",
                Rook: "https://upload.wikimedia.org/wikipedia/commons/7/72/Chess_rlt45.svg",
                Queen: "https://upload.wikimedia.org/wikipedia/commons/1/15/Chess_qlt45.svg",
                King: "https://upload.wikimedia.org/wikipedia/commons/4/42/Chess_klt45.svg"
            },
            Black: { 
                Pawn: "https://upload.wikimedia.org/wikipedia/commons/c/c7/Chess_pdt45.svg",
                Knight: "https://upload.wikimedia.org/wikipedia/commons/e/ef/Chess_ndt45.svg",
                Bishop: "https://upload.wikimedia.org/wikipedia/commons/9/98/Chess_bdt45.svg",
                Rook: "https://upload.wikimedia.org/wikipedia/commons/f/ff/Chess_rdt45.svg",
                Queen: "https://upload.wikimedia.org/wikipedia/commons/4/47/Chess_qdt45.svg",
                King: "https://upload.wikimedia.org/wikipedia/commons/f/f0/Chess_kdt45.svg"
            }
        };

        const Piece = ({ type, color = 'White' }) => {
            return (
                <img 
                    src={PIECE_IMAGES[color][type]} 
                    alt={`${color} ${type}`} 
                    className="w-full h-full select-none pointer-events-none drop-shadow-md"
                    onError={(e) => { e.target.style.display = 'none'; }}
                />
            );
        };

        // --- CHESS LOGIC HELPERS ---
        const toCoord = (x, y) => String.fromCharCode(x + 97) + (y + 1);
        const isDarkSquare = (x, y) => (x + y) % 2 === 0;
        
        const toIdx = (coord) => {
            const clean = coord.trim().toLowerCase();
            if (clean.length !== 2) return null;
            const x = clean.charCodeAt(0) - 97;
            const y = parseInt(clean[1]) - 1;
            if (x >= 0 && x <= 7 && y >= 0 && y <= 7) return [x, y];
            return null;
        };

        const getPiecesFromFEN = (fenStr) => {
            const tempChess = new Chess(fenStr);
            const board = tempChess.board();
            const typeMap = { 'p': 'Pawn', 'n': 'Knight', 'b': 'Bishop', 'r': 'Rook', 'q': 'Queen', 'k': 'King' };
            const pArr = [];
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (board[r][c]) {
                        pArr.push({
                            pos: [c, 7 - r],
                            type: typeMap[board[r][c].type],
                            color: board[r][c].color === 'w' ? 'White' : 'Black'
                        });
                    }
                }
            }
            return pArr;
        };

        const getKnightMoves = (x, y) => {
            const moves = [];
            [[1, 2], [2, 1], [2, -1], [1, -2], [-1, -2], [-2, -1], [-2, 1], [-1, 2]].forEach(([dx, dy]) => {
                const nx = x + dx, ny = y + dy;
                if (nx >= 0 && nx <= 7 && ny >= 0 && ny <= 7) moves.push([nx, ny]);
            });
            return moves;
        };

        const getSlidingMoves = (x, y, dirs, occ) => {
            const moves = [];
            for (const [dx, dy] of dirs) {
                let nx = x + dx, ny = y + dy;
                while (nx >= 0 && nx <= 7 && ny >= 0 && ny <= 7) {
                    moves.push([nx, ny]);
                    if (occ.has(`${nx},${ny}`)) break;
                    nx += dx; ny += dy;
                }
            }
            return moves;
        };

        const getBishopMoves = (x, y, occ = new Set()) => getSlidingMoves(x, y, [[1, 1], [1, -1], [-1, -1], [-1, 1]], occ);
        const getRookMoves = (x, y, occ = new Set()) => getSlidingMoves(x, y, [[0, 1], [1, 0], [0, -1], [-1, 0]], occ);
        
        const getKingMoves = (x, y) => {
            const moves = [];
            for (let dx = -1; dx <= 1; dx++) {
                for (let dy = -1; dy <= 1; dy++) {
                    if (dx === 0 && dy === 0) continue;
                    const nx = x + dx, ny = y + dy;
                    if (nx >= 0 && nx <= 7 && ny >= 0 && ny <= 7) moves.push([nx, ny]);
                }
            }
            return moves;
        };

        const getPawnAttacks = (x, y) => {
            const moves = [];
            if (y - 1 >= 0) {
                if (x - 1 >= 0) moves.push([x - 1, y - 1]);
                if (x + 1 <= 7) moves.push([x + 1, y - 1]);
            }
            return moves;
        };

        const isQueenAttack = (qx, qy, tx, ty) => {
            if (qx === tx && qy === ty) return false;
            return qx === tx || qy === ty || Math.abs(qx - tx) === Math.abs(qy - ty);
        };

 
        // NEW: Added themeFilter parameter
        const useAdaptiveEngine = (database, startLevel, themeFilter = 'Mix') => {
            const [currentLevel, setCurrentLevel] = React.useState(startLevel);
            const [seenIds, setSeenIds] = React.useState(new Set()); 

            const getNextPuzzle = React.useCallback((targetLvl) => {
                // 1. Filter by Theme
                let pool = database || [];
                if (themeFilter && themeFilter !== 'Mix') {
                    pool = pool.filter(p => p.theme === themeFilter);
                }

                if (!pool || pool.length === 0) return null; 

                // 2. Filter out puzzles they've already seen
                let unseenPool = pool.filter(p => !seenIds.has(p.id));

                // If they've seen everything in this theme, wipe memory and start over
                if (unseenPool.length === 0) {
                    setSeenIds(new Set());
                    unseenPool = pool;
                }

                let selectedPuzzle = null;

                // --- 3. THE 3-TIER SELECTION LOGIC ---

                // Tier 1: Look for anything within +/- 1.0 of their current level
                const tier1 = unseenPool.filter(p => Math.abs(p.difficulty - targetLvl) <= 1.0);
                
                // Tier 2: Look for anything within +/- 2.0 of their current level
                const tier2 = unseenPool.filter(p => Math.abs(p.difficulty - targetLvl) <= 2.0);

                if (tier1.length > 0) {
                    // Pick a completely random puzzle from the +/- 1.0 pool
                    selectedPuzzle = tier1[Math.floor(Math.random() * tier1.length)];
                } else if (tier2.length > 0) {
                    // Expand search: Pick a random puzzle from the +/- 2.0 pool
                    selectedPuzzle = tier2[Math.floor(Math.random() * tier2.length)];
                } else {
                    // Ultimate Fallback: Just give them a random unseen puzzle
                    selectedPuzzle = unseenPool[Math.floor(Math.random() * unseenPool.length)];
                }

                // 4. Record this puzzle in the memory bank
                setSeenIds(prev => {
                    const newSet = new Set(prev);
                    newSet.add(selectedPuzzle.id);
                    return newSet;
                });

                return selectedPuzzle;
            }, [database, themeFilter, seenIds]);

            const updateLevel = (change) => {
                setCurrentLevel(prev => Math.max(1, Math.min(10, prev + change)));
            };

            return { currentLevel, getNextPuzzle, updateLevel };
        };
        // --- UI COMPONENTS ---
        const Scoresheet = ({ moves, activeIndex = -1, darkTheme = false }) => {
            const rows = [];
            for (let i = 0; i < moves.length; i += 2) {
                rows.push({
                    num: Math.floor(i / 2) + 1,
                    w: moves[i],
                    wIdx: i,
                    b: moves[i + 1] || '',
                    bIdx: i + 1
                });
            }
            
            const bgClass = darkTheme ? 'bg-slate-900/50 text-slate-300' : 'bg-slate-50 text-slate-700 shadow-inner border border-slate-200';
            const hoverClass = darkTheme ? 'hover:bg-slate-800' : 'hover:bg-slate-200/50';
            const numClass = darkTheme ? 'text-slate-500' : 'text-slate-400';
            const activeClass = darkTheme ? 'bg-blue-900/50 text-blue-200 rounded px-1' : 'bg-blue-200 text-blue-900 rounded px-1';

            return (
                <div className={`w-full rounded-lg p-3 max-h-48 overflow-y-auto font-mono text-sm md:text-base ${bgClass}`}>
                    {rows.map(r => (
                        <div key={r.num} className={`flex py-1 px-2 ${hoverClass} rounded transition-colors`}>
                            <div className={`w-10 font-bold ${numClass}`}>{r.num}.</div>
                            <div className={`w-16 font-semibold flex-1 ${activeIndex === r.wIdx ? activeClass : ''}`}>{r.w}</div>
                            <div className={`w-16 font-semibold flex-1 ${activeIndex === r.bIdx ? activeClass : ''}`}>{r.b}</div>
                        </div>
                    ))}
                </div>
            );
        };
            const Chessboard = ({ pieces = [], markers = [], onSquareClick, disabled = false, showCoords = true, renderMode = 'normal' }) => {
                const squares = [];
                for (let row = 7; row >= 0; row--) {
                for (let col = 0; col <= 7; col++) {
                    const isDark = isDarkSquare(col, row);
                    const piece = pieces.find(p => p.pos[0] === col && p.pos[1] === row);
                    const marker = markers.find(m => m.pos[0] === col && m.pos[1] === row);
                    
                    squares.push(
                        <div 
                            key={`${col}-${row}`}
                            onClick={() => !disabled && onSquareClick && onSquareClick(col, row)}
                            className={`relative w-full aspect-square flex items-center justify-center select-none overflow-hidden
                                ${isDark ? 'bg-[#f0d9b5]' : 'bg-[#b58863]'}
                                ${onSquareClick && !disabled ? 'cursor-pointer hover:opacity-80' : ''}
                            `}
                        >
                            {/* Updated coordinates to match Lichess contrast perfectly */}
                            {showCoords && col === 0 && <span className={`absolute top-1 left-1 text-[10px] font-bold ${isDark ? 'text-[#b58863]' : 'text-[#f0d9b5]'}`}>{row + 1}</span>}
                            {showCoords && row === 0 && <span className={`absolute bottom-0 right-1 text-[10px] font-bold ${isDark ? 'text-[#b58863]' : 'text-[#f0d9b5]'}`}>{String.fromCharCode(col + 97)}</span>}
                            
                            {marker && <div className={`absolute w-full h-full ${marker.opacity || 'opacity-60'} ${marker.color}`} />}
                            
                            {piece && renderMode === 'circles' ? (
                                <div className={`w-[55%] h-[55%] rounded-full shadow-md border-4 border-black/10 z-10 ${piece.color === 'White' ? 'bg-slate-100' : 'bg-slate-800'}`} />
                            ) : piece && (
                                <div className={`relative w-[80%] h-[80%] z-10 transition-transform hover:scale-110 ${piece.isBoss ? 'boss-glow' : ''}`}>
                                    <Piece type={piece.type} color={piece.color} />
                                </div>
                            )}
                        </div>
                    );
                }
            }

            return (
                <div className="w-full max-w-md mx-auto border-4 border-slate-800 rounded-sm overflow-hidden shadow-2xl bg-white">
                    <div className="grid grid-cols-8 grid-rows-8 w-full h-full">
                        {squares}
                    </div>
                </div>
            );
        };
        const TierSelector = ({ onSelect, onBack }) => {
    return (
        <div className="flex flex-col items-center w-full max-w-lg mt-8 space-y-6 animate-fade-in">
            {/* Header */}
            <div className="text-center mb-4">
                <h2 className="text-3xl font-black text-slate-100 drop-shadow-md">Select Starting Tier</h2>
                <p className="text-slate-400 font-medium mt-2">The Adaptive Engine will adjust difficulty based on your performance.</p>
            </div>
            
            {/* Novice Tier */}
            <button onClick={() => onSelect(1.0)} className="w-full text-left p-6 bg-slate-800 rounded-xl shadow-lg border border-slate-700 hover:border-green-500 hover:bg-slate-800/80 transition-all duration-200 group">
                <div className="flex justify-between items-center">
                    <h3 className="text-xl font-bold text-green-400 transition-colors">Novice Tier</h3>
                    <span className="bg-green-900/40 border border-green-800/50 text-green-300 text-xs font-bold px-3 py-1 rounded">Start: Level 1.0</span>
                </div>
                <p className="text-slate-400 mt-2">Building foundational visualization. Focus on 1-move calculations.</p>
            </button>

            {/* Club Tier */}
            <button onClick={() => onSelect(4.0)} className="w-full text-left p-6 bg-slate-800 rounded-xl shadow-lg border border-slate-700 hover:border-blue-500 hover:bg-slate-800/80 transition-all duration-200 group">
                <div className="flex justify-between items-center">
                    <h3 className="text-xl font-bold text-blue-400 transition-colors">Club Tier</h3>
                    <span className="bg-blue-900/40 border border-blue-800/50 text-blue-400 text-xs font-bold px-3 py-1 rounded">Start: Level 4.0</span>
                </div>
                <p className="text-slate-400 mt-2">Testing your sight. Deep tactical lines and first-contact trades.</p>
            </button>

            {/* Master Tier */}
            <button onClick={() => onSelect(7.0)} className="w-full text-left p-6 bg-slate-800 rounded-xl shadow-lg border border-slate-700 hover:border-purple-500 hover:bg-slate-800/80 transition-all duration-200 group">
                <div className="flex justify-between items-center">
                    <h3 className="text-xl font-bold text-purple-400 transition-colors">Master Tier</h3>
                    <span className="bg-purple-900/40 border border-purple-800/50 text-purple-300 text-xs font-bold px-3 py-1 rounded">Start: Level 7.0</span>
                </div>
                <p className="text-slate-400 mt-2">Elite calculation. Complex interference, quiet moves, and deep variations.</p>
            </button>

            {/* Back Button */}
            <button onClick={onBack} className="mt-8 text-sm text-slate-500 font-bold hover:text-slate-300 transition-colors uppercase tracking-widest">
                Back to Menu
            </button>
        </div>
    );
};
        // --- SIMPLE LICHESS LINK ---
        const openLichess = (fen) => {
            // Lichess URLs prefer underscores instead of spaces for FEN strings
            const encodedFen = fen.replace(/ /g, '_');
            window.open(`https://lichess.org/analysis/${encodedFen}`, '_blank');
        };


        const NormalTacticDrill = ({ onExit, startLevel, themeFilter }) => {
            const { currentLevel, getNextPuzzle, updateLevel } = useAdaptiveEngine(typeof NORMAL_TACTICS !== 'undefined' ? NORMAL_TACTICS : [], startLevel, themeFilter);
            
            const [puzzle, setPuzzle] = React.useState(null);
            const [game, setGame] = React.useState(null);
            const [currentFen, setCurrentFen] = React.useState('');
            const [feedback, setFeedback] = React.useState("");
            
            const [attemptState, setAttemptState] = React.useState('playing');
            const [shakeError, setShakeError] = React.useState(false);
            const [stepIndex, setStepIndex] = React.useState(0);
            
            const [selectedSquare, setSelectedSquare] = React.useState(null);
            
            // NEW: State for the Hint System
            const [hintRevealed, setHintRevealed] = React.useState(false);

            const loadNewPuzzle = React.useCallback((targetLvl) => {
                const nextPuzz = getNextPuzzle(targetLvl);
                if (nextPuzz) {
                    const newGame = new Chess(nextPuzz.fen);
                    
                    setPuzzle(nextPuzz);
                    setGame(newGame);
                    setCurrentFen(newGame.fen());
                    setFeedback("Your turn. Find the best move.");
                    setAttemptState('playing');
                    setStepIndex(0);
                    setSelectedSquare(null);
                    
                    // NEW: Reset the hint for every new puzzle
                    setHintRevealed(false);
                } else {
                    setFeedback("Database empty or no puzzles match this theme!");
                }
            }, [getNextPuzzle]);

            React.useEffect(() => {
                if (!puzzle) loadNewPuzzle(currentLevel);
            }, [puzzle, loadNewPuzzle, currentLevel]);

            const triggerShake = () => {
                setShakeError(false);
                setTimeout(() => setShakeError(true), 10);
            };

            const handleSquareClick = (col, row) => {
                if (attemptState === 'revealed' || !game) return;

                const sq = `${String.fromCharCode(col + 97)}${row + 1}`;

                if (!selectedSquare) {
                    const piece = game.get(sq);
                    if (piece && piece.color === game.turn()) {
                        setSelectedSquare(sq);
                    }
                    return;
                }

                if (selectedSquare === sq) {
                    setSelectedSquare(null);
                    return;
                }

                const moveAttempt = { from: selectedSquare, to: sq, promotion: 'q' };
                const tempGame = new Chess(game.fen());
                const result = tempGame.move(moveAttempt);

                if (!result) {
                    const piece = game.get(sq);
                    if (piece && piece.color === game.turn()) {
                        setSelectedSquare(sq); 
                    } else {
                        setSelectedSquare(null); 
                    }
                    return;
                }

                const solutionArray = Array.isArray(puzzle.solution) ? puzzle.solution : [puzzle.solution];
                const expectedMove = solutionArray[stepIndex];
                const stepAlternatives = (puzzle.alternatives && puzzle.alternatives[stepIndex]) ? puzzle.alternatives[stepIndex] : [];
                
                const isMainLine = result.san === expectedMove;
                const isAlternative = stepAlternatives.includes(result.san);

                if (isMainLine) {
                    game.move(moveAttempt);
                    setCurrentFen(game.fen());
                    setSelectedSquare(null);

                    const nextStep = stepIndex + 1;
                    const opponentReply = solutionArray[nextStep];

                    if (opponentReply) {
                        setFeedback("Correct! Opponent is thinking...");
                        setStepIndex(nextStep + 1);
                        
                        setTimeout(() => {
                            game.move(opponentReply);
                            setCurrentFen(game.fen());
                            setFeedback(`Opponent played ${opponentReply}. Your turn!`);
                        }, 500);

                    } else {
                        if (attemptState === 'playing') {
                            setFeedback("Perfect! Tactical sequence complete. (+0.4)");
                            updateLevel(0.4);
                        } else {
                            setFeedback("Correct! Good recovery. (-0.4)");
                            updateLevel(-0.4);
                        }
                        setAttemptState('revealed');
                    }
                } else if (isAlternative) {
                    setFeedback(`Alternative move (${result.san})! That works, but there's a better one. Try again.`);
                    setSelectedSquare(null);
                } else {
                    triggerShake();
                    setSelectedSquare(null);
                    if (attemptState === 'playing') {
                        setFeedback(`Incorrect move (${result.san}). Look deeper! (Strike 1)`);
                        setAttemptState('strike1');
                    } else {
                        setFeedback(`Incorrect. Main line was: ${solutionArray.join(', ')}. (-1.0)`);
                        updateLevel(-1.0);
                        setAttemptState('revealed');
                        game.move(expectedMove);
                        setCurrentFen(game.fen());
                    }
                }
            };

            if (!puzzle) return <div className="text-slate-500 font-bold mt-10">Loading Database...</div>;

            let feedbackColorClass = 'text-slate-600';
            if (feedback.includes('Incorrect')) feedbackColorClass = 'text-red-500';
            else if (feedback.includes('Perfect') || feedback.includes('recovery')) feedbackColorClass = 'text-green-600';
            else if (feedback.includes('Alternative')) feedbackColorClass = 'text-blue-600'; 

            const markers = [];
            if (selectedSquare) {
                const col = selectedSquare.charCodeAt(0) - 97;
                const row = parseInt(selectedSquare[1]) - 1;
                markers.push({ pos: [col, row], color: 'bg-yellow-400', opacity: 'opacity-50' });
            }

            return (
                <div className="flex flex-col items-center w-full">
                    {/* Top Bar: Adaptive Stats */}
                    <div className="flex justify-between w-full max-w-md px-2 mb-4 items-center">
                        <div className="font-bold text-slate-700">Adaptive Rank: <span className="text-blue-600">Level {currentLevel.toFixed(1)}</span></div>
                        <div className="text-xs font-bold bg-slate-200 text-slate-700 px-3 py-1 rounded">Diff: {puzzle.difficulty}/10</div>
                    </div>

                    {/* NEW: Turn Indicator & Hint System */}
                    <div className="flex justify-between w-full max-w-md px-2 mb-6 items-center">
                        {game && (
                            <div className={`px-4 py-2 rounded-lg font-black uppercase tracking-wider text-sm shadow-sm border-2 ${game.turn() === 'w' ? 'bg-white text-slate-800 border-slate-200' : 'bg-slate-800 text-white border-slate-700'}`}>
                                {game.turn() === 'w' ? '⬜ White to Move' : '⬛ Black to Move'}
                            </div>
                        )}
                        
                        {!hintRevealed ? (
                            <button onClick={() => setHintRevealed(true)} className="text-xs font-bold bg-purple-100 text-purple-700 px-4 py-2 rounded-lg hover:bg-purple-200 transition shadow-sm">
                                💡 Show Hint
                            </button>
                        ) : (
                            <div className="text-xs font-black text-purple-600 uppercase tracking-widest bg-purple-50 px-4 py-2 rounded-lg border border-purple-100 shadow-sm animate-fade-in">
                                Theme: {puzzle.theme}
                            </div>
                        )}
                    </div>

                    <div className={`text-sm md:text-lg font-bold min-h-[1.5rem] mb-6 text-center transition-colors ${feedbackColorClass}`}>
                        {feedback}
                    </div>

                    <div className={`w-full max-w-md ${shakeError ? 'shake' : ''}`}>
                        <Chessboard 
                            pieces={getPiecesFromFEN(currentFen)} 
                            markers={markers}
                            onSquareClick={handleSquareClick}
                            renderMode="normal" 
                        />
                    </div>

                    {attemptState === 'revealed' && (
                        <div className="flex space-x-4 w-full max-w-md mt-6">
                            <button type="button" onClick={() => openLichess(puzzle.fen)} className="flex-1 bg-slate-800 text-white font-bold py-4 rounded-xl hover:bg-slate-700 transition shadow-md">🔍 Analyze</button>
                            <button type="button" onClick={() => loadNewPuzzle(currentLevel)} className="flex-1 bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition shadow-md">Next Puzzle ➡️</button>
                        </div>
                    )}

                    <button onClick={onExit} className="mt-8 text-slate-500 hover:text-slate-800 font-medium underline">Back to Menu</button>
                </div>
            );
        };
    const SurvivalTacticDrill = ({ onExit, themeFilter }) => {
    // Survival always starts at Level 1.0
    const { currentLevel, getNextPuzzle, updateLevel } = useAdaptiveEngine(
        typeof NORMAL_TACTICS !== 'undefined' ? NORMAL_TACTICS : [], 
        1.0, 
        themeFilter
    );
    
    const [puzzle, setPuzzle] = React.useState(null);
    const [game, setGame] = React.useState(null);
    const [currentFen, setCurrentFen] = React.useState('');
    const [feedback, setFeedback] = React.useState("");
    const [attemptState, setAttemptState] = React.useState('playing');
    const [shakeError, setShakeError] = React.useState(false);
    const [stepIndex, setStepIndex] = React.useState(0);
    const [selectedSquare, setSelectedSquare] = React.useState(null);
    const [hintRevealed, setHintRevealed] = React.useState(false);

    // NEW: Survival Mechanics State
    const [lives, setLives] = React.useState(3);
    const [streak, setStreak] = React.useState(0);
    const [gameOver, setGameOver] = React.useState(false);
    const MAX_LIVES = 3;

    const loadNewPuzzle = React.useCallback((targetLvl) => {
        const nextPuzz = getNextPuzzle(targetLvl);
        if (nextPuzz) {
            const newGame = new Chess(nextPuzz.fen);
            setPuzzle(nextPuzz);
            setGame(newGame);
            setCurrentFen(newGame.fen());
            setFeedback("Your turn. Survive.");
            setAttemptState('playing');
            setStepIndex(0);
            setSelectedSquare(null);
            setHintRevealed(false);
        } else {
            setFeedback("No more puzzles found for this theme!");
        }
    }, [getNextPuzzle]);

    React.useEffect(() => { if (!puzzle && !gameOver) loadNewPuzzle(currentLevel); }, [puzzle, loadNewPuzzle, gameOver]);

    // NEW: Reset functionality for Game Over
    const handleRestart = () => {
        setLives(3);
        setStreak(0);
        setGameOver(false);
        // We need to fetch a Level 1 puzzle manually to bypass the currentLevel state lag
        updateLevel(-currentLevel + 1); // Force back to 1.0
        loadNewPuzzle(1.0); 
    };

    const handleSquareClick = (col, row) => {
        if (attemptState === 'revealed' || !game || gameOver) return;
        const sq = `${String.fromCharCode(col + 97)}${row + 1}`;

        if (!selectedSquare) {
            const piece = game.get(sq);
            if (piece && piece.color === game.turn()) setSelectedSquare(sq);
            return;
        }

        if (selectedSquare === sq) { setSelectedSquare(null); return; }

        const moveAttempt = { from: selectedSquare, to: sq, promotion: 'q' };
        const tempGame = new Chess(game.fen());
        const result = tempGame.move(moveAttempt);

        if (!result) {
            const piece = game.get(sq);
            if (piece && piece.color === game.turn()) setSelectedSquare(sq);
            else setSelectedSquare(null);
            return;
        }

        const solutionArray = Array.isArray(puzzle.solution) ? puzzle.solution : [puzzle.solution];
        const expectedMove = solutionArray[stepIndex];
        const stepAlternatives = (puzzle.alternatives && puzzle.alternatives[stepIndex]) ? puzzle.alternatives[stepIndex] : [];
        
        if (result.san === expectedMove) {
            game.move(moveAttempt);
            setCurrentFen(game.fen());
            setSelectedSquare(null);
            const nextStep = stepIndex + 1;
            const opponentReply = solutionArray[nextStep];

            if (opponentReply) {
                setFeedback("Correct! Opponent is thinking...");
                setStepIndex(nextStep + 1);
                setTimeout(() => {
                    game.move(opponentReply);
                    setCurrentFen(game.fen());
                    setFeedback(`Opponent played ${opponentReply}. Your turn!`);
                }, 500);
            } else {
                // SURVIVAL WIN LOGIC: +0.8 Level, +1 Streak
                const newStreak = streak + 1;
                let winMessage = `Boom! (+0.8)`;
                
                if (newStreak >= 5 && lives < MAX_LIVES) {
                    setLives(l => l + 1);
                    setStreak(0);
                    winMessage = `LIFE STEAL! 💖 (+0.8)`;
                } else if (newStreak >= 5 && lives === MAX_LIVES) {
                    setStreak(0); // Reset streak even if full, keeps them grinding
                    winMessage = `MAX LIVES! 🔥 (+0.8)`;
                } else {
                    setStreak(newStreak);
                }

                setFeedback(winMessage);
                updateLevel(0.8);
                setAttemptState('revealed');
            }
        } else if (stepAlternatives.includes(result.san)) {
            setFeedback(`Alternative move (${result.san})! Better one exists. No life lost.`);
            setSelectedSquare(null);
        } else {
            // SURVIVAL LOSE LOGIC: Instant -1.0 Level, -1 Life, reset streak
            setShakeError(false); setTimeout(() => setShakeError(true), 10);
            setSelectedSquare(null);
            
            const newLives = lives - 1;
            setLives(newLives);
            setStreak(0);
            updateLevel(-1.0);
            setAttemptState('revealed');
            
            game.move(expectedMove);
            setCurrentFen(game.fen());

            if (newLives <= 0) {
                setFeedback("FATAL MISTAKE. Game Over.");
                setGameOver(true);
            } else {
                setFeedback(`Ouch! Lost a life. Correct line: ${solutionArray.join(', ')}`);
            }
        }
    };

    if (!puzzle) return <div className="mt-20 text-slate-400 font-bold">Loading Database...</div>;

    return (
        <div className="flex flex-col items-center w-full max-w-lg animate-fade-in">
            {/* SURVIVAL HUD */}
            <div className="flex justify-between w-full px-2 mb-4 text-sm font-black text-slate-700 items-center">
                <div className="flex flex-col">
                    <span className="text-blue-600">Level {currentLevel.toFixed(1)}</span>
                    <span className="text-[10px] text-slate-400 uppercase tracking-widest">Diff: {puzzle.difficulty}</span>
                </div>
                
                <div className="flex flex-col items-end">
                    <div className="flex gap-1 text-lg">
                        {Array.from({ length: MAX_LIVES }).map((_, i) => (
                            <span key={i}>{i < lives ? '❤️' : '🖤'}</span>
                        ))}
                    </div>
                    <span className="text-orange-500 text-xs mt-1">🔥 STREAK: {streak}/5</span>
                </div>
            </div>

            {/* Turn & Hint Row */}
            <div className="flex justify-between w-full px-2 mb-6 items-center">
                <div className={`px-3 py-1.5 rounded-lg font-black text-[10px] uppercase border-2 shadow-sm ${game?.turn() === 'w' ? 'bg-white text-slate-800 border-slate-200' : 'bg-slate-800 text-white border-slate-700'}`}>
                    {game?.turn() === 'w' ? '⬜ White' : '⬛ Black'}
                </div>
                {!hintRevealed ? (
                    <button onClick={() => setHintRevealed(true)} className="text-[10px] font-black bg-purple-100 text-purple-700 px-3 py-1.5 rounded-lg hover:bg-purple-200 transition uppercase tracking-tighter">💡 Hint</button>
                ) : (
                    <div className="text-[10px] font-black text-purple-600 bg-purple-50 px-3 py-1.5 rounded-lg border border-purple-100 uppercase animate-fade-in">Theme: {puzzle.theme}</div>
                )}
            </div>

            <div className={`text-sm font-bold mb-4 h-6 text-center ${feedback.includes('Incorrect') || feedback.includes('Ouch') || feedback.includes('FATAL') ? 'text-red-500' : feedback.includes('Boom') || feedback.includes('STEAL') ? 'text-green-600' : 'text-slate-600'}`}>
                {feedback}
            </div>

            <div className={`${shakeError ? 'shake' : ''} ${gameOver ? 'grayscale opacity-70 transition-all duration-1000' : ''}`}>
                <Chessboard 
                    pieces={getPiecesFromFEN(currentFen)} 
                    markers={selectedSquare ? [{ pos: [selectedSquare.charCodeAt(0)-97, parseInt(selectedSquare[1])-1], color: 'bg-yellow-400', opacity: 'opacity-40' }] : []}
                    onSquareClick={handleSquareClick}
                    renderMode="normal" 
                />
            </div>

            {/* GAME OVER SCREEN OVERLAY */}
            {gameOver && (
                <div className="w-full mt-6 p-6 bg-red-50 border-2 border-red-200 rounded-xl text-center shadow-lg animate-fade-in">
                    <h3 className="text-red-600 font-black text-xl mb-2">RUN TERMINATED</h3>
                    <p className="text-slate-700 font-bold mb-6">You survived up to <span className="text-blue-600">Level {currentLevel.toFixed(1)}</span></p>
                    
                    <div className="flex gap-2 w-full">
                        <button onClick={onExit} className="flex-1 py-3 bg-slate-200 text-slate-600 font-bold rounded-xl text-sm">Main Menu</button>
                        <button onClick={handleRestart} className="flex-1 py-3 bg-red-600 text-white font-bold rounded-xl text-sm shadow-md">Try Again 🔄</button>
                    </div>
                </div>
            )}

            {attemptState === 'revealed' && !gameOver && (
                <div className="flex gap-2 mt-6 w-full">
                    <button onClick={() => window.open(`https://lichess.org/analysis/${puzzle.fen}`, '_blank')} className="flex-1 py-3 bg-slate-100 text-slate-600 font-bold rounded-xl text-sm">Analyze</button>
                    <button onClick={() => loadNewPuzzle(currentLevel)} className="flex-1 py-3 bg-blue-600 text-white font-bold rounded-xl text-sm shadow-lg shadow-blue-200">Next Puzzle</button>
                </div>
            )}
            
            {!gameOver && (
                <button onClick={onExit} className="mt-8 text-xs text-slate-400 font-bold hover:text-slate-600 uppercase tracking-widest">Retreat to Menu</button>
            )}
        </div>
    );
};
const ClassicalGauntletDrill = ({ onExit, themeFilter }) => {
    // Gauntlet always starts at Level 1.0
    const { currentLevel, getNextPuzzle, updateLevel } = useAdaptiveEngine(
        typeof NORMAL_TACTICS !== 'undefined' ? NORMAL_TACTICS : [], 
        1.0, 
        themeFilter
    );
    
    const [puzzle, setPuzzle] = React.useState(null);
    const [game, setGame] = React.useState(null);
    const [currentFen, setCurrentFen] = React.useState('');
    const [feedback, setFeedback] = React.useState("");
    const [attemptState, setAttemptState] = React.useState('playing');
    const [shakeError, setShakeError] = React.useState(false);
    const [stepIndex, setStepIndex] = React.useState(0);
    const [selectedSquare, setSelectedSquare] = React.useState(null);

    // CLOCK & GAUNTLET STATE
    const [timeLeft, setTimeLeft] = React.useState(0);
    const [clockPhase, setClockPhase] = React.useState('think'); // 'think' or 'execution'
    const [isClockRunning, setIsClockRunning] = React.useState(false);
    const [gameOver, setGameOver] = React.useState(false);

    // Timer Effect
    React.useEffect(() => {
        let timer;
        if (isClockRunning && timeLeft > 0) {
            timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
        } else if (isClockRunning && timeLeft <= 0) {
            handleFailure("TIME EXPIRED.");
        }
        return () => clearInterval(timer);
    }, [isClockRunning, timeLeft]);

    // Format Time for Display
    const formatTime = (seconds) => {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return `${m}:${s.toString().padStart(2, '0')}`;
    };

    const loadNewPuzzle = React.useCallback((targetLvl) => {
        const nextPuzz = getNextPuzzle(targetLvl);
        if (nextPuzz) {
            const newGame = new Chess(nextPuzz.fen);
            setPuzzle(nextPuzz);
            setGame(newGame);
            setCurrentFen(newGame.fen());
            
            // Formula: 5 + (1 * Difficulty) in minutes -> to seconds
            const initialSeconds = Math.floor((5 + nextPuzz.difficulty) * 60);
            setTimeLeft(initialSeconds);
            setClockPhase('think');
            setIsClockRunning(true);
            
            setFeedback("Deep thought required. Board is live.");
            setAttemptState('playing');
            setStepIndex(0);
            setSelectedSquare(null);
            setGameOver(false);
        } else {
            setFeedback("No more puzzles found in database.");
            setIsClockRunning(false);
        }
    }, [getNextPuzzle]);

    React.useEffect(() => { if (!puzzle && !gameOver) loadNewPuzzle(currentLevel); }, [puzzle, loadNewPuzzle, gameOver]);

    const handleRestart = () => {
        setGameOver(false);
        updateLevel(-10); // Force Adaptive Engine back down to the 1.0 floor
        loadNewPuzzle(1.0); 
    };

    const handleFailure = (reason) => {
        setIsClockRunning(false);
        setShakeError(false); setTimeout(() => setShakeError(true), 10);
        setSelectedSquare(null);
        
        updateLevel(-10); // The Brutal Reset to 1.0
        setAttemptState('revealed');
        setGameOver(true);
        
        if (puzzle && game) {
            const solutionArray = Array.isArray(puzzle.solution) ? puzzle.solution : [puzzle.solution];
            const expectedMove = solutionArray[stepIndex];
            if (expectedMove) game.move(expectedMove);
            setCurrentFen(game.fen());
            setFeedback(`${reason} Resetting to Level 1.0.`);
        }
    };

    const handleSquareClick = (col, row) => {
        if (attemptState === 'revealed' || !game || gameOver) return;
        const sq = `${String.fromCharCode(col + 97)}${row + 1}`;

        if (!selectedSquare) {
            const piece = game.get(sq);
            if (piece && piece.color === game.turn()) setSelectedSquare(sq);
            return;
        }

        if (selectedSquare === sq) { setSelectedSquare(null); return; }

        const moveAttempt = { from: selectedSquare, to: sq, promotion: 'q' };
        const tempGame = new Chess(game.fen());
        const result = tempGame.move(moveAttempt);

        if (!result) {
            const piece = game.get(sq);
            if (piece && piece.color === game.turn()) setSelectedSquare(sq);
            else setSelectedSquare(null);
            return;
        }

        const solutionArray = Array.isArray(puzzle.solution) ? puzzle.solution : [puzzle.solution];
        const expectedMove = solutionArray[stepIndex];
        const stepAlternatives = (puzzle.alternatives && puzzle.alternatives[stepIndex]) ? puzzle.alternatives[stepIndex] : [];
        
        if (result.san === expectedMove) {
            game.move(moveAttempt);
            setCurrentFen(game.fen());
            setSelectedSquare(null);
            
            const nextStep = stepIndex + 1;
            const opponentReply = solutionArray[nextStep];

            if (opponentReply) {
                // Phase Transition: Move 1 correct, switch to 30s Execution Phase
                if (stepIndex === 0) {
                    setClockPhase('execution');
                    setTimeLeft(30);
                }
                
                setIsClockRunning(false); // Pause clock while opponent "thinks"
                setFeedback("Correct. Awaiting opponent reply...");
                setStepIndex(nextStep + 1);
                
                setTimeout(() => {
                    game.move(opponentReply);
                    setCurrentFen(game.fen());
                    setFeedback(`Opponent played ${opponentReply}. Execute!`);
                    setTimeLeft(30); // Snap back to 30s for the student's next move
                    setIsClockRunning(true);
                }, 500);
            } else {
                // Puzzle Complete
                setIsClockRunning(false);
                setFeedback("Flawless execution. (+0.2)");
                updateLevel(0.2);
                setAttemptState('revealed');
            }
        } else if (stepAlternatives.includes(result.san)) {
            // THE TIME TAX: Alternative move, clock does NOT reset, piece returns to start.
            setFeedback(`Alternative move (${result.san}). Keep looking! Clock is draining.`);
            setSelectedSquare(null);
        } else {
            // BLUNDER
            handleFailure(`Fatal Blunder (${result.san}).`);
        }
    };

    if (!puzzle) return <div className="mt-20 text-slate-400 font-bold">Loading Database...</div>;

    // "Hush" UI Classes
    const uiWrapper = gameOver ? "bg-slate-50" : "bg-slate-900";
    const textColor = gameOver ? "text-slate-800" : "text-slate-300";
    const clockColor = clockPhase === 'think' ? "text-blue-400 border-blue-900/50 bg-blue-950/30" : "text-red-500 border-red-900/50 bg-red-950/30 animate-pulse";

    return (
        <div className={`flex flex-col items-center w-full min-h-screen p-4 transition-colors duration-1000 ${uiWrapper}`}>
            <div className="w-full max-w-lg animate-fade-in flex flex-col items-center mt-4">
                
                {/* THE CLOCK DISPLAY */}
                <div className={`text-5xl font-black mb-6 px-8 py-4 rounded-2xl border shadow-inner tracking-tighter transition-all duration-500 ${gameOver ? 'text-slate-400 border-slate-200 bg-white' : clockColor}`}>
                    {formatTime(timeLeft)}
                </div>

                {/* Header Stats */}
                <div className={`flex justify-between w-full px-2 mb-4 text-xs font-bold uppercase tracking-widest ${textColor}`}>
                    <span>Rank: <span className={gameOver ? "text-red-600" : "text-blue-400"}>Lvl {currentLevel.toFixed(1)}</span></span>
                    <span className="opacity-50">Diff: {puzzle.difficulty}</span>
                </div>

                <div className={`text-sm font-bold mb-4 h-6 text-center ${feedback.includes('Fatal') || feedback.includes('EXPIRED') ? 'text-red-500' : feedback.includes('Flawless') ? 'text-green-500' : textColor}`}>
                    {feedback}
                </div>
                {/* TURN & COMPOSITION ROW */}
                <div className="flex justify-between items-center w-full mb-4 px-2 h-8">
                    {/* Turn Indicator */}
                    <div className={`px-3 py-1 rounded-md font-black text-[10px] uppercase border shadow-sm transition-colors duration-1000 ${
                        gameOver ? 'bg-slate-200 text-slate-500 border-slate-300' :
                        game?.turn() === 'w' ? 'bg-slate-100 text-slate-800 border-slate-300' : 'bg-slate-800 text-slate-100 border-slate-600'
                    }`}>
                        {game?.turn() === 'w' ? '⬜ White to Move' : '⬛ Black to Move'}
                    </div>

                    {/* Conditional Theme Reveal (ONLY shows if it's exactly 'Composition: Mate in 2') */}
                    {puzzle?.theme === 'Composition: Mate in 2' && (
                        <div className={`text-[10px] font-black px-3 py-1 rounded-md border uppercase animate-fade-in ${
                            gameOver ? 'bg-slate-200 text-slate-500 border-slate-300' : 'text-purple-300 bg-purple-900/30 border-purple-800/50'
                        }`}>
                            Target: Mate in 2
                        </div>
                    )}
                </div>
                {/* THE BOARD */}
                <div className={`${shakeError ? 'shake' : ''} ${gameOver ? 'grayscale opacity-70 transition-all duration-1000' : 'shadow-2xl shadow-blue-900/20'}`}>
                    <Chessboard 
                        pieces={getPiecesFromFEN(currentFen)} 
                        markers={selectedSquare ? [{ pos: [selectedSquare.charCodeAt(0)-97, parseInt(selectedSquare[1])-1], color: 'bg-yellow-400', opacity: 'opacity-40' }] : []}
                        onSquareClick={handleSquareClick}
                        renderMode="normal" 
                    />
                </div>

                {/* GAME OVER SCREEN OVERLAY */}
                {gameOver && (
                    <div className="w-full mt-6 p-6 bg-white border-2 border-slate-200 rounded-xl text-center shadow-lg animate-fade-in">
                        <h3 className="text-red-600 font-black text-xl mb-2">GAUNTLET FAILED</h3>
                        <p className="text-slate-500 text-sm font-bold mb-6">Precision compromised. You have been returned to Level 1.0.</p>
                        
                        <div className="flex gap-2 w-full">
                            <button onClick={onExit} className="flex-1 py-3 bg-slate-100 text-slate-600 font-bold rounded-xl text-sm">Surrender</button>
                            <button onClick={handleRestart} className="flex-1 py-3 bg-slate-800 text-white font-bold rounded-xl text-sm shadow-md">Restart Gauntlet</button>
                        </div>
                    </div>
                )}

                {/* SUCCESS REVEAL */}
                {attemptState === 'revealed' && !gameOver && (
                    <div className="flex gap-2 mt-6 w-full">
                        <button onClick={() => window.open(`https://lichess.org/analysis/${puzzle.fen}`, '_blank')} className="flex-1 py-3 bg-slate-800/50 text-slate-300 font-bold rounded-xl text-sm border border-slate-700 hover:bg-slate-700 transition">Analyze</button>
                        <button onClick={() => loadNewPuzzle(currentLevel)} className="flex-1 py-3 bg-blue-600 text-white font-bold rounded-xl text-sm shadow-lg shadow-blue-900/50 hover:bg-blue-500 transition">Next Sequence</button>
                    </div>
                )}
                
                {!gameOver && (
                    <button onClick={onExit} className={`mt-8 text-xs font-bold uppercase tracking-widest transition opacity-50 hover:opacity-100 ${textColor}`}>Abandon Run</button>
                )}
            </div>
        </div>
    );
};

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [view, setView] = useState('menu'); 
            const [startLvl, setStartLvl] = useState(1.0);
            const [activeDrill, setActiveDrill] = useState(null);
            const [selectedTheme, setSelectedTheme] = useState('Mix'); 

            const MenuBtn = ({ title, desc, onClick }) => (
                <button 
                    onClick={onClick}
                    className="w-full text-left p-5 mb-4 rounded-xl bg-slate-800 border border-slate-700 hover:bg-slate-700 hover:border-blue-500 transition-all duration-200 group shadow-lg"                >

                    <h3 className="font-black text-lg text-slate-200 group-hover:text-blue-400 transition-colors">{title}</h3>
                    <p className="text-sm font-bold text-slate-500 mt-1">{desc}</p>
                </button>
            );

            return (
                <div className="min-h-screen bg-slate-900 text-slate-200 font-sans pb-10 transition-colors duration-500 flex flex-col items-center">
                    <header className="mb-8 text-center mt-4">
                        <h1 className="text-4xl font-black text-slate-100 uppercase tracking-tighter mb-2 text-center drop-shadow-md">
                            The Calculation Suite
                        </h1>
                        {view === 'menu' && (
                            <div className="mt-4 flex flex-col items-center space-y-2">
                                <p className="text-slate-400 font-bold mb-10 text-center">
                                    Select a drill to begin training
                                </p>
                            </div>
                        )}
                    </header>

                    <main className="w-full max-w-4xl flex-1 flex flex-col items-center justify-start">
                        {view === 'menu' && (
                            <div className="w-full max-w-2xl grid gap-4">
                                                                
                                <div className="border-t-2 border-slate-200 pt-4 mt-2">

                                    <div className="text-xs font-black text-slate-400 uppercase tracking-widest mb-3 ml-2">Adaptive Training Engine</div>
                                    {/* --- TARGET FOCUS SELECTOR --- */}
                                <div className="w-full max-w-sm mb-6 flex flex-col items-center">
                                    <label className="text-xs font-black text-slate-400 uppercase tracking-widest mb-2">
                                        
                                    </label>
                                    <select 
                                        value={selectedTheme} 
                                        onChange={(e) => setSelectedTheme(e.target.value)}
                                        className="w-full p-4 mb-8 rounded-xl bg-slate-800 border-2 border-slate-700 text-slate-200 font-bold hover:bg-slate-700 transition"
                                    >
                                        <option value="Mix">🎲 Full Spectrum (Mixed)</option>
                                        
                                        {/* This magically extracts all unique themes from your tactic database! */}
                                        {[...new Set(NORMAL_TACTICS.map(p => p.theme))].map(theme => (
                                            <option key={theme} value={theme}>🎯 {theme}</option>
                                        ))}
                                    </select>
                                </div>
                                <MenuBtn title="Normal Tactics (Adaptive)" desc="Interactive point-and-click tactical training." onClick={() => { setActiveDrill('nt'); setView('tiers'); }} />                                    
                                <div className="mt-4"></div>
                                <MenuBtn title="Survival Tactics" desc="3 Lives. Level up fast, but mistakes cost you dearly."onClick={() => { setActiveDrill('st'); setView('survivaltactics'); }} // 'st' for Survival Tactics
                                />
                                                                <div className="mt-4"></div>

                                <MenuBtn 
                                    title="Classical Gauntlet" 
                                    desc="Deep calculation. Scaling clock. One mistake = Reset to Level 1.0." 
                                    onClick={() => { setActiveDrill('cg'); setView('classicalgauntlet'); }} 
                                />                                
                                </div>
                            </div>
                        )}


                        {view === 'tiers' && (
                            <TierSelector onSelect={(l) => { 
                                setStartLvl(l); 
                                // Clean logic: Only two paths now
                                if (activeDrill === 'st') {
                                    setView('survivaltactics');
                                } else {
                                    setView('normaltactics'); 
                                }
                            }} onBack={() => setView('menu')} />
                        )}

                        {view === 'normaltactics' && (
                            <NormalTacticDrill 
                                onExit={() => setView('menu')} 
                                startLevel={startLvl} 
                                themeFilter={selectedTheme} 
                            />
                        )}

                        {view === 'survivaltactics' && (
                            <SurvivalTacticDrill 
                                onExit={() => setView('menu')} 
                                themeFilter={selectedTheme}
                            />
                        )}
                        {view === 'classicalgauntlet' && (
                            <ClassicalGauntletDrill 
                                onExit={() => setView('menu')} 
                                themeFilter={selectedTheme}
                            />
                        )}            
                                    {/* --- FOOTER --- */}
                        <div className="w-full text-center py-8 mt-auto">
                            <p className="text-slate-400 text-sm font-bold tracking-wide">
                                Built with ❤️ by <span className="text-slate-500"> [Bournakas Apostolos]</span>
                            </p>
                            <p className="text-slate-300 text-xs mt-1">
                                The [Σκακιστικός Σύλλογος Τρίπολης] Secret Weapon 🐑
                            </p>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
